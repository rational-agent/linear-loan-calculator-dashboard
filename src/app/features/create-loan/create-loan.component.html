<div class="col-4">
    <h1>Calculate new loan</h1>
    <form #loginForm="ngForm">
        <div class="mb-3">
            <label class="form-label">Start date:</label>
            <input type="date" name="startDate" class="form-control" ngModel required>
        </div>
        <div class="mb-3">
            <label class="form-label">End date:</label>
            <input type="date" name="endDate" class="form-control" ngModel required>
        </div>
        <div class="mb-3">
            <label class="form-label">Principal:</label>
            <input type="number" name="principal" class="form-control" ngModel required>
        </div>
        <div class="mb-3">
            <label class="form-label">Interest rate:</label>
            <input type="number" name="interestRate" class="form-control" ngModel required>
        </div>
        <button class="btn btn-primary" type="submit" (click)="insertLoan(loginForm)"
                [disabled]="loginForm.invalid || loading">
            @if (loading) {
                <span class="spinner-border spinner-border-sm me-2"></span>
                Creating...
            } @else {
                Create
            }
        </button>
    </form>
</div>
